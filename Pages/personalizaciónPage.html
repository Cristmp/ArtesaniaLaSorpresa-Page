<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Personalización</title>
  <link rel="stylesheet" href="/Styles/PersonalizaciónStyles.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <header class="navbar">
    <div class="logo">Logo</div>
    <nav class="menu">
      <a href="#">Inicio</a>
      <a href="#">Catálogo</a>
      <a href="#">Ofertas</a>
      <a href="#" class="active">Personalización</a>
    </nav>
    <div class="nav-buttons">
      <a href="#" class="login">Iniciar sesión</a>
      <button class="register-btn">Registrarse</button>
      <div class="user-icon"><span>👤</span></div>
    </div>
  </header>

  <main class="container">

    <section class="banner">
      <img src="https://i.postimg.cc/XJ7bVGvn/Captura-de-pantalla-2026-05-31-105153.jpg" alt="banner">
      <div class="banner-overlay"></div>
      <div class="banner-content">
       
      </div>
    </section>

    <section class="custom-section">

      <div class="gallery">
        <div class="main-image">
          <img src="https://i.postimg.cc/Y2JMKSYV/camisa-azul.jpg" alt="Camisa">
        </div>

        <div class="thumbnails">
          <div class="thumb active-thumb">
            <img src="https://i.postimg.cc/Y2JMKSYV/camisa-azul.jpg" alt="">
          </div>
          <div class="thumb">
            <img src="https://ramitexnicaragua.com/wp-content/uploads/2023/07/T-3111-C1.jpg" alt="">
          </div>
          <div class="thumb">
            <img src="https://img.freepik.com/fotos-premium/gorra-tela-lona-negra-aislada-sobre-fondo-blanco_99974-475.jpg" alt="">
          </div>
          <div class="thumb">
            <img src="https://static.vecteezy.com/system/resources/previews/003/815/150/large_2x/back-view-blue-jeans-jacket-isolated-on-white-background-denim-jacket-close-up-photo.jpg" alt="">
          </div>
        </div>
      </div>

      <div class="divider-line"></div>

      <div class="form-section">
        <div class="form-group">
          <label>Color</label>
          <div class="colors">
            <span class="color white active-color"></span>
            <span class="color blue"></span>
            <span class="color red"></span>
            <span class="color black"></span>
          </div>
        </div>

        <div class="form-group">
          <label>Talla</label>
          <div class="sizes">
            <button>S</button>
            <button>M</button>
            <button>L</button>
            <button>XL</button>
            <button>XXL</button>
          </div>
        </div>

        <div class="form-group">
          <label>Descripción</label>
          <textarea placeholder="Describe las características que quieres que tenga la prenda"></textarea>
        </div>

        <div class="form-group">
          <label>Tipo de tela</label>
          <input type="text" placeholder="Ej. Algodón, poliéster, etc.">
        </div>

        <div class="double-input">
          <div class="form-group">
            <label>Número celular*</label>
            <input type="text" placeholder="5722 9078">
          </div>
          <div class="form-group">
            <label>Nombre *</label>
            <input type="text" placeholder="Cristian David Torres">
          </div>
        </div>

        <button class="order-btn">Hacer pedido</button>
      </div>

    </section>
  </main>

</body>
</html>
